<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Photos – Clean Boss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Upload photos</div>
        <div class="topbar-sub">Document your completed clean</div>
      </div>
      <div class="topbar-spacer"></div>
      <a href="my-jobs.html" class="topbar-btn">← Back to jobs</a>
    </div>
    <div class="content">
      <div style="max-width:640px;">
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header"><div class="card-title">Job: Grey Lynn House</div><span class="pill blue">Today 2pm</span></div>
          <div class="card-body">
            <p style="font-size:13px;color:#6b7c93;margin-bottom:20px;">Upload photos of each room after cleaning. These are stored against the job and visible to property managers and admins.</p>
            <div class="upload-zone" onclick="document.getElementById('file-input').click()">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <div style="font-size:14px;font-weight:600;color:#1a2535;margin-bottom:4px;">Click to upload photos</div>
              <div style="font-size:12px;color:#6b7c93;">JPG, PNG up to 10MB each</div>
            </div>
            <input type="file" id="file-input" multiple accept="image/*" style="display:none;" onchange="handleFiles(this.files)"/>
            <div id="photo-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Room checklist</div></div>
          <div class="card-body" style="padding:0;">
            <div id="room-list"></div>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
          <a href="my-jobs.html" class="btn">Cancel</a>
          <button class="btn primary" onclick="submitPhotos()">Submit photos</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
  CB.init('upload-photos', { name:'Marcus Lee', initials:'ML', role:'cleaner' });
  const rooms = ['Living room','Kitchen','Master bedroom','Bedroom 2','Bathroom','Laundry'];
  document.getElementById('room-list').innerHTML = rooms.map((r,i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #f3f4f6;">
      <span style="font-size:13px;font-weight:500;">${r}</span>
      <span id="room-status-${i}" style="font-size:12px;color:#6b7c93;">No photos yet</span>
    </div>`).join('');
  function handleFiles(files) {
    const grid = document.getElementById('photo-grid');
    Array.from(files).forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = e => {
        const div = document.createElement('div');
        div.style.cssText = 'position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:#f3f4f6;';
        div.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;"/><button onclick="this.parentElement.remove()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;">×</button>`;
        grid.appendChild(div);
        const roomEl = document.getElementById(`room-status-${idx % rooms.length}`);
        if(roomEl) roomEl.innerHTML = '<span style="color:#166534;font-weight:600;">✓ Uploaded</span>';
      };
      reader.readAsDataURL(file);
    });
  }
  function submitPhotos() {
    const grid = document.getElementById('photo-grid');
    if(!grid.children.length) { alert('Please upload at least one photo before submitting.'); return; }
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#166534;color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;';
    t.textContent = '✓ Photos submitted successfully';
    document.body.appendChild(t);
    setTimeout(() => { t.remove(); window.location.href='my-jobs.html'; }, 2000);
  }
</script>
</body>
</html>
